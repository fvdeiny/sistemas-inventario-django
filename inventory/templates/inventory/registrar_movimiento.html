<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Movimiento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white py-3">
                        <h4 class="mb-0">🔄 Registrar Movimiento de Inventario</h4>
                    </div>
                    <div class="card-body p-4">
                        
                        <form method="POST">
                            {% csrf_token %} {% if form.non_field_errors %}
                                <div class="alert alert-danger">{{ form.non_field_errors }}</div>
                            {% endif %}

                            <div class="mb-3">
                                <label class="form-label">Seleccione el Producto</label>
                                {{ form.producto }}
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Tipo de Movimiento</label>
                                {{ form.tipo }}
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Cantidad</label>
                                {{ form.cantidad }}
                                {% if form.cantidad.errors %}
                                    <div class="text-danger small mt-1">{{ form.cantidad.errors.0 }}</div>
                                {% endif %}
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Motivo / Descripción</label>
                                {{ form.motivo }}
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-success">Guardar Movimiento</button>
                                <a href="{% url 'lista_productos' %}" class="btn btn-outline-secondary">Cancelar</a>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
